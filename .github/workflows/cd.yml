name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires lowercase repository paths, but github.repository preserves
      # the original casing (e.g. Totenem/WritOauth). Lowercase it once here.
      - name: Compute lowercase image repo
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_REPO }}/backend:latest
            ghcr.io/${{ env.IMAGE_REPO }}/backend:${{ github.sha }}
          # Reuse the layer + pip caches produced by CI builds.
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_REPO }}/frontend:latest
            ghcr.io/${{ env.IMAGE_REPO }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy to Railway/Render
        run: |
          # GHCR paths are lowercase; github.repository preserves original casing.
          REPO="${GITHUB_REPOSITORY,,}"
          echo "Configure RAILWAY_TOKEN or RENDER_API_KEY in repository secrets."
          echo "Then replace this step with the appropriate deploy CLI command."
          echo "Images available at:"
          echo "  ghcr.io/${REPO}/backend:${{ github.sha }}"
          echo "  ghcr.io/${REPO}/frontend:${{ github.sha }}"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify backend health
        run: |
          echo "Configure BACKEND_URL secret, then replace with:"
          echo "  curl --fail \${{ secrets.BACKEND_URL }}/health"
          echo "Health check placeholder — configure before production launch."
