name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy to Railway/Render
        run: |
          echo "Configure RAILWAY_TOKEN or RENDER_API_KEY in repository secrets."
          echo "Then replace this step with the appropriate deploy CLI command."
          echo "Images available at:"
          echo "  ghcr.io/${{ github.repository }}/backend:${{ github.sha }}"
          echo "  ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Verify backend health
        run: |
          echo "Configure BACKEND_URL secret, then replace with:"
          echo "  curl --fail \${{ secrets.BACKEND_URL }}/health"
          echo "Health check placeholder — configure before production launch."
